name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-pages
  cancel-in-progress: true

env:
  CLOUDFLARE_PROJECT_NAME: paradiso-pizza

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Ensure Cloudflare Pages project exists
        run: |
          npx wrangler pages project create "$CLOUDFLARE_PROJECT_NAME" --production-branch=main || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Deploy to Cloudflare Pages
        run: |
          npx wrangler pages deploy dist \
            --project-name="$CLOUDFLARE_PROJECT_NAME" \
            --branch="$GITHUB_REF_NAME" \
            --commit-hash="$GITHUB_SHA" \
            --commit-message="$COMMIT_MESSAGE"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message || 'Manual Cloudflare Pages deployment' }}
